name: Lint & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: pip install ruff

      - name: Run ruff linter
        run: ruff check src/ scripts/ app/

      - name: Install lightweight test deps (CPU-only torch)
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install Pillow numpy faiss-cpu loguru pydantic requests

      - name: Run import smoke test
        run: |
          python -c "from src.ingestion.pdf_processor import PDFProcessor; print('pdf_processor OK')"
          python -c "from src.ingestion.indexer import DocumentIndex; print('indexer OK')"
          python -c "from src.retrieval.retriever import ColPaliRetriever; print('retriever OK')"
